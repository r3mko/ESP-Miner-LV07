name: Unit Test
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32s3
          command: GITHUB_ACTIONS="true" idf.py build
          path: 'test-ci'

      - name: Run tests
        uses: bitaxeorg/esp32-qemu-test-action@main
        with:
          path: 'test-ci'

      - name: Upload event file
        uses: actions/upload-artifact@v4
        with:
          name: event-file
          path: ${{ github.event_path }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: report.xml

      - name: Check for test failures
        if: always()
        run: |
          FAILURES=$(grep -oP 'failures="\K[0-9]+' report.xml || echo 0)
          if [ "$FAILURES" -gt 0 ]; then
            echo "::error ::Detected $FAILURES test failures."
            exit 1
          fi

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'

      - name: Run frontend tests
        working-directory: ./main/http_server/axe-os
        run: |
          npm ci
          npm run test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: main/http_server/axe-os/report.xml
