name: Build Firmware [Push]

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Firmware ${{ matrix.module }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: mcn16r8
            sdkconfig_defaults: sdkconfig.mcn16r8.defaults
          - module: mcn16r2
            sdkconfig_defaults: sdkconfig.mcn16r2.defaults
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.14.0'
    - name: Build web dist
      working-directory: ./main/http_server/axe-os
      run: |
        npm ci
        npm run build
    - name: esp-idf build
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.5.3
        target: esp32s3
        command: GITHUB_ACTIONS="true" idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;${{ matrix.sdkconfig_defaults }}" build
        path: '.'
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - run: pip install esptool
    - name: "Create factory/merged image"
      run: "./merge_bin.sh ./esp-miner-merged-${{ matrix.module }}.bin"
    - name: "Prepare firmware artifact"
      run: "cp ./build/esp-miner.bin ./esp-miner-${{ matrix.module }}.bin"
    - name: upload esp-miner-merged.bin
      uses: actions/upload-artifact@v4
      with:
        name: esp-miner-factory-${{ matrix.module }}.bin
        path: ./esp-miner-merged-${{ matrix.module }}.bin
    - name: upload esp-miner.bin
      uses: actions/upload-artifact@v4
      with:
        name: esp-miner-${{ matrix.module }}.bin
        path: ./esp-miner-${{ matrix.module }}.bin
    - name: upload www.bin
      if: matrix.module == 'mcn16r8'
      uses: actions/upload-artifact@v4
      with:
        name: www.bin
        path: ./build/www.bin
