
<div *ngIf="form != null" class="card">
    <form [formGroup]="form">
        <div class="flex justify-content-between flex-column md:align-items-center md:flex-row mb-3">
            <h2 class="mb-0 h-3rem">
                Realtime Logs
            </h2>

            <nav class="flex gap-3 w-full md:w-6">
                <p-iconfield class="w-full">
                    <p-inputicon styleClass="pi pi-filter"></p-inputicon>
                    <input
                        pInputText
                        type="text"
                        autocomplete="off"
                        placeholder="Case-sensitive filter"
                        id="filter"
                        formControlName="filter"/>
                </p-iconfield>
                <p-button
                    pp-button
                    icon="pi pi-{{stopScroll ? 'play' : 'pause'}}"
                    (click)="stopScroll = !stopScroll"
                    pTooltip="{{stopScroll ? 'Start' : 'Stop'}} Scrolling"
                    tooltipPosition="left">
                </p-button>
                <p-button
                    pp-button
                    icon="pi pi-{{loadingLogs ? 'spinner pi-spin' : 'download'}}"
                    [disabled]="loadingLogs"
                    (click)="downloadLogs()"
                    pTooltip="Download Logs"
                    tooltipPosition="left">
                </p-button>
                <p-button
                    pp-button
                    icon="pi pi-trash"
                    (click)="clearLogs()"
                    pTooltip="Clear Logs"
                    tooltipPosition="left">
                </p-button>

            </nav>
        </div>

        <div id="logs" #scrollContainer>
            <div *ngFor="let log of logs" [ngClass]="log.className">₿ {{log.text | ANSI}}</div>
        </div>
    </form>
</div>
